<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Morning Star</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #0B0F19; --bg-surface: #161B26; --accent: #38BDF8; --text-main: #F8FAFC; --text-muted: #94A3B8; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Inter', sans-serif; }
        .glow-border { border: 2px solid rgba(56, 189, 248, 0.2); transition: all 0.3s ease; }
        .glow-border:focus-within { border-color: var(--accent); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        .toast { transform: translateY(100px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="flex items-center justify-center min-height-screen p-4">

    <div class="w-full max-w-4xl bg-[#161B26] rounded-3xl p-8 flex flex-col md:flex-row gap-8 shadow-2xl border border-gray-800/50">
        
        <div class="flex-1 flex flex-col justify-between py-4">
            <div>
                <div class="flex items-center gap-2 mb-8">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#38BDF8" class="w-8 h-8 animate-pulse">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499c.151-.312.596-.312.748 0l2.401 4.881 5.376.78c.346.05.482.472.232.716l-3.89 3.793.918 5.352c.059.344-.302.607-.609.445L12 14c-.297.163-.658-.1-.599-.445l.918-5.352-3.89-3.793c-.25-.244-.114-.666.232-.716l5.376-.78 2.401-4.88z" />
                    </svg>
                    <span class="text-xl font-bold tracking-wider uppercase bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">Morning Star</span>
                </div>

                <h1 class="text-3xl font-extrabold mb-2">Create your biometric identity</h1>
                <p class="text-sm text-[#94A3B8] mb-6">We need 5 angles of your beautiful face to keep the intruders guessing.</p>
                
                <div class="glow-border bg-[#0B0F19] rounded-xl p-3 flex items-center gap-3 mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#94A3B8" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                    </svg>
                    <input type="text" id="username" placeholder="What should we call you?" class="bg-transparent border-none outline-none w-full text-white placeholder-gray-500 text-sm">
                </div>
            </div>

            <div>
                <div class="text-xs font-semibold text-[#38BDF8] uppercase tracking-widest mb-2">Registration Status</div>
                <div class="text-sm text-[#94A3B8]" id="status-commentary">Waiting for you to type a name and look directly into the void.</div>
                
                <div class="mt-6 flex gap-4">
                    <button id="capture-btn" class="flex-1 bg-[#38BDF8] hover:bg-[#0EA5E9] text-[#0B0F19] font-bold py-3.5 px-6 rounded-xl transition duration-200 flex items-center justify-center gap-2 shadow-lg shadow-sky-500/10">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316A2.192 2.192 0 0 0 14.513 4H9.487c-.661 0-1.272.396-1.582 1.02l-.822 1.317Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                        Snap Pic (<span id="count">0</span>/5)
                    </button>
                    <button id="submit-btn" style="display:none;" class="flex-1 bg-emerald-400 hover:bg-emerald-500 text-[#0B0F19] font-bold py-3.5 px-6 rounded-xl transition duration-200 shadow-lg shadow-emerald-500/10">
                        Beam Me Up 🚀
                    </button>
                </div>
            </div>
        </div>

        <div class="flex-1 relative flex flex-col items-center justify-center bg-[#0B0F19] rounded-2xl p-4 border border-gray-800">
            <div class="absolute top-4 left-4 z-10 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full text-xs font-mono tracking-widest text-[#38BDF8] uppercase border border-sky-500/20">
                Live Scanner Feed
            </div>
            <video id="video" class="w-full h-auto aspect-[4/3] object-cover rounded-xl border border-gray-700/40" autoplay></video>
            <canvas id="canvas" class="hidden"></canvas>
            
            <div class="flex gap-2 mt-4 w-full justify-start overflow-x-auto py-2" id="preview-strip">
                </div>
        </div>
    </div>

    <div id="toast" class="toast opacity-0 fixed bottom-6 right-6 bg-rose-500 text-white font-medium px-6 py-3.5 rounded-xl shadow-2xl max-w-sm flex items-center gap-3 border border-rose-400/20">
        <span id="toast-message">Oops! No face detected.</span>
    </div>

    <script>
        const video = document.getElementById('video');
        const captureBtn = document.getElementById('capture-btn');
        const submitBtn = document.getElementById('submit-btn');
        const countSpan = document.getElementById('count');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const commentary = document.getElementById('status-commentary');
        const previewStrip = document.getElementById('preview-strip');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-message');
        
        let capturedImages = [];
        const funnyPhrases = [
            "Nice start! Now tilt slightly up so we can see your majestic chin.",
            "Perfect. Give us a subtle smoulder. Think tech-billionaire.",
            "Beautiful. Now pretend you just saw a bug. Perfect angle.",
            "One more! Look straight into the camera like you owe it money.",
            "Excellent data captured. You're ready to cross the digital Rubicon."
        ];

        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { showToast("Camera denied. Are you hiding from us?"); });

        function showToast(msg, isSuccess = false) {
            toast.className = `toast fixed bottom-6 right-6 font-medium px-6 py-3.5 rounded-xl shadow-2xl max-w-sm flex items-center gap-3 border ${isSuccess ? 'bg-emerald-500 border-emerald-400/20' : 'bg-rose-500 border-rose-400/20'} show`;
            toastMsg.innerText = msg;
            setTimeout(() => { toast.classList.remove('show'); }, 4500);
        }

        captureBtn.addEventListener('click', () => {
            const username = document.getElementById('username').value.trim();
            if(!username) {
                showToast("Whoops! A nameless ghost cannot be registered.");
                return;
            }

            if (capturedImages.length < 5) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = canvas.toDataURL('image/jpeg');
                capturedImages.push(imageData);
                
                countSpan.innerText = capturedImages.length;
                commentary.innerText = funnyPhrases[capturedImages.length - 1];

                // Append thumbnail in Google Photos fashion
                let thumb = document.createElement('img');
                thumb.src = imageData;
                thumb.className = "w-12 h-12 rounded-lg object-cover border-2 border-[#38BDF8] animate-scale-up";
                previewStrip.appendChild(thumb);
                
                if (capturedImages.length === 5) {
                    captureBtn.style.display = 'none';
                    submitBtn.style.display = 'block';
                }
            }
        });

        submitBtn.addEventListener('click', () => {
            const username = document.getElementById('username').value;
            fetch('/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, images: capturedImages })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    showToast("Identity recognized. Welcome aboard!", true);
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    showToast(data.message + " Let's try that profile shoot again.");
                    setTimeout(() => location.reload(), 3000);
                }
            });
        });
    </script>
</body>
</html>
